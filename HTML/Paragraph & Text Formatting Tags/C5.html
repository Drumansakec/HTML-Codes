<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Superscript and Subscript</title>
</head>
<body>
    <h1>Superscript and Subscript</h1>

    <p>
        Superscript: x<sup>2</sup>
    </p>

    <p>
        Subscript: H<sub>2</sub>O
    </p>
</body>
