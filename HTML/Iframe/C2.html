<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Iframe Examples</h1>
    <!-- YouTube Video -->
    <h2>YouTube Video</h2>
    <iframe
        width="560"
        height="315"
        src="https://www.youtube.com/embed/dQw4w9WgXcQ"
        title="YouTube video player"
        frameborder="0"
        allowfullscreen>
    </iframe>
    <br><br>
    <!-- Google Map -->
    <h2>Google Map</h2>
    <iframe
        src="https://www.google.com/maps/embed?pb=!1m18..."
        width="600"
        height="450"
        style="border:0;"
        loading="lazy"
        allowfullscreen>
    </iframe>
    <br><br>
    <!-- Another Webpage -->
    <h2>Another Webpage</h2>
    <iframe
        src="https://www.wikipedia.org"
        width="800"
        height="400">
    </iframe>
</body>
</html>
